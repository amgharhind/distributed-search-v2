server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Spring Boot API
    location /api/ {
        proxy_pass         http://search-api:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Spring Boot Actuator (health, prometheus)
    location /actuator/ {
        proxy_pass       http://search-api:8080;
        proxy_set_header Host $host;
    }

    # FastAPI re-ranker (/reranker/health → http://reranker:8001/health)
    location /reranker/ {
        proxy_pass       http://reranker:8001/;
        proxy_set_header Host $host;
    }

    # Elasticsearch cluster health (/es/… → http://es01:9200/…)
    location /es/ {
        proxy_pass       http://es01:9200/;
        proxy_set_header Host $host;
    }
}

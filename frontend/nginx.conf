# Rate limiting zones (defined outside server block)
# Search: 30 requests/min per IP — prevents scraping
limit_req_zone $binary_remote_addr zone=search_zone:10m rate=30r/m;
# General API: 120 requests/min per IP
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=120r/m;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Add real IP to all proxied requests
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host            $host;

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Search endpoint — rate limited (30 req/min, burst of 10)
    location /api/v2/search {
        limit_req zone=search_zone burst=10 nodelay;
        limit_req_status 429;
        proxy_pass         http://search-api:8080;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Rest of API — rate limited (120 req/min, burst of 20)
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        limit_req_status 429;
        proxy_pass         http://search-api:8080;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Spring Boot Actuator (health, prometheus)
    location /actuator/ {
        proxy_pass http://search-api:8080;
    }

    # FastAPI re-ranker (/reranker/health → http://reranker:8001/health)
    location /reranker/ {
        proxy_pass http://reranker:8001/;
    }

    # Elasticsearch cluster health (/es/… → http://es01:9200/…)
    location /es/ {
        proxy_pass http://es01:9200/;
    }
}

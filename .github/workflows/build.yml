name: CI

on:
  push:
  pull_request:

jobs:

  java-test:
    name: Java / search-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run Maven tests
        run: mvn -B test --no-transfer-progress
        working-directory: search-api

  python-test:
    name: Python / reranking-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: reranking-service/requirements-dev.txt

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt
        working-directory: reranking-service

      - name: Run pytest
        run: pytest tests/ -v
        working-directory: reranking-service
